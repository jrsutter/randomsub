<script>
const subreddits = [
  "gonewild","nsfw_gifs","porn_gifs","rule34","hentai",
  "ass","boobs","milf","thick","fitgirls","realgirls","nsfw_gifs",
  "NSFW_GIF",
  "porn_gifs",
  "nsfw_videos",
  "realgirls",
  "watchitfortheplot",
  "NSFWFunny",
  "NSFW_HTML5"
];

document.getElementById("randomBtn").onclick = loadPost;

async function loadPost() {
  const content = document.getElementById("content");
  content.innerHTML = "<p>Loading...</p>";

  try {
    const sub = subreddits[Math.floor(Math.random() * subreddits.length)];

    const url = `https://api.allorigins.win/raw?url=https://www.reddit.com/r/${sub}/hot.json?limit=50`;

    const res = await fetch(url);
    const data = await res.json();

    const posts = data.data.children;

    for (let i = 0; i < posts.length; i++) {
      const post = posts[Math.floor(Math.random() * posts.length)].data;
      const media = post.url || "";

      if (media.match(/\.(jpg|jpeg|png)$/i)) {
        content.innerHTML = `
          <h3>${post.title}</h3>
          <img src="${media}">
        `;
        return;
      }

      if (media.includes("gif") || post.is_video) {
        const vid =
          post.media?.reddit_video?.fallback_url ||
          media.replace(".gifv", ".mp4");

        content.innerHTML = `
          <h3>${post.title}</h3>
          <video src="${vid}" autoplay loop controls></video>
        `;
        return;
      }
    }

    content.innerHTML = "<p>No media found, try again</p>";

  } catch (err) {
    content.innerHTML = "<p>⚠️ Error loading content</p>";
    console.error(err);
  }
}
</script>
