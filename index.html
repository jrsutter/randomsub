<script>
const subreddits = [
  "nsfw",
  "gonewild",
  "nsfw_gifs",
  "rule34",
  "nsfwcosplay"
];

let showMedia = true;

document.getElementById("randomBtn").addEventListener("click", loadRandomPost);
document.getElementById("toggleMedia").addEventListener("click", () => {
  showMedia = !showMedia;
  loadRandomPost();
});

async function loadRandomPost() {
  const subreddit = subreddits[Math.floor(Math.random() * subreddits.length)];

  // Use "hot" instead of random (more reliable)
  const url = `https://www.reddit.com/r/${subreddit}/hot.json?limit=50`;

  try {
    const res = await fetch(url, {
      headers: {
        "User-Agent": "Mozilla/5.0"
      }
    });

    const data = await res.json();
    const posts = data.data.children;

    // pick random post from list
    const randomPost = posts[Math.floor(Math.random() * posts.length)].data;

    const contentDiv = document.getElementById("content");
    contentDiv.innerHTML = `
      <h3>${randomPost.title}</h3>
      <a href="https://reddit.com${randomPost.permalink}" target="_blank">View on Reddit</a>
    `;

    if (showMedia) {
      const url = randomPost.url;

      if (url.match(/\.(jpg|jpeg|png)$/i)) {
        contentDiv.innerHTML += `<img src="${url}" />`;
      } 
      else if (url.match(/\.(gif)$/i) || url.includes("gifv")) {
        const gifUrl = url.replace(".gifv", ".mp4");
        contentDiv.innerHTML += `<video src="${gifUrl}" autoplay loop controls></video>`;
      } 
      else if (randomPost.is_video && randomPost.media?.reddit_video?.fallback_url) {
        contentDiv.innerHTML += `<video src="${randomPost.media.reddit_video.fallback_url}" autoplay loop controls></video>`;
      } 
      else {
        contentDiv.innerHTML += `<p>No previewable media found.</p>`;
      }
    }

  } catch (err) {
    console.error(err);
    document.getElementById("content").innerHTML = `<p>Error loading content. Try again.</p>`;
  }
}
</script>
